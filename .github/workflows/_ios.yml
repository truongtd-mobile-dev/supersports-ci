name: iOS build (reusable)

# Reusable iOS build. Drives both the ad-hoc (internal testing) and TestFlight
# lanes — the only difference is the `kind` input, which is forwarded verbatim
# to `fastlane setup ... kind:<kind>`. Callers: internal-testing.yml (adhoc),
# testflight.yml (testflight).

on:
  workflow_call:
    inputs:
      branch:
        description: Branch to build from Gitea.
        required: true
        type: string
      environment:
        description: staging or live.
        required: true
        type: string
      kind:
        description: adhoc or testflight.
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: iOS ${{ inputs.kind }} (${{ inputs.environment }})
    runs-on: macos-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 120

    env:
      BUILD_BRANCH: ${{ inputs.branch }}
      BUILD_ENV: ${{ inputs.environment }}
      BUILD_KIND: ${{ inputs.kind }}
      PRIVATE_HOST: ${{ secrets.PRIVATE_HOST }}
      PRIVATE_REPO_PATH: ${{ secrets.PRIVATE_REPO_PATH }}

    steps:
      # Checks out THIS repo (the CI repo) so the local composite actions under
      # .github/actions are on disk. The app source is cloned separately into
      # real-code/ by the checkout-source action below.
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Validate ASC API key for TestFlight
        if: inputs.kind == 'testflight'
        env:
          ASC_KEY: ${{ secrets.ASC_API_KEY_JSON }}
        run: |
          if [ -z "$ASC_KEY" ]; then
            echo "::error::ASC_API_KEY_JSON secret is required when kind=testflight. Generate one at https://appstoreconnect.apple.com/access/integrations/api (role: App Manager)."
            exit 1
          fi

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Checkout app source
        uses: ./.github/actions/checkout-source
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          private-host: ${{ secrets.PRIVATE_HOST }}
          private-repo-path: ${{ secrets.PRIVATE_REPO_PATH }}
          branch: ${{ inputs.branch }}
          match-git-url: ${{ secrets.MATCH_GIT_URL }}

      - name: Write app secrets
        uses: ./.github/actions/write-app-secrets
        with:
          environment: ${{ inputs.environment }}
          env-file: ${{ secrets.ENV_FILE }}

      - name: Write ASC API key
        if: inputs.kind == 'testflight'
        env:
          ASC_KEY: ${{ secrets.ASC_API_KEY_JSON }}
        working-directory: real-code
        run: |
          printf '%s' "$ASC_KEY" > fastlane/api_key.json
          chmod 600 fastlane/api_key.json

      - name: Setup JS
        uses: ./.github/actions/setup-js

      - name: Setup Ruby + fastlane
        uses: ./.github/actions/setup-ruby-fastlane

      - name: Cache CocoaPods downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: cocoapods-v1-${{ runner.os }}-${{ hashFiles('real-code/yarn.lock') }}
          restore-keys: cocoapods-v1-${{ runner.os }}-

      - name: Cache iOS native build
        id: cache-ios
        uses: actions/cache@v4
        with:
          # The cached `ios/` tree must include ios/DerivedData — the Fastfile
          # points xcodebuild's derived data there explicitly. Without DerivedData
          # in this cache, gym(clean: false) on a warm cache still triggers a cold
          # compile. Bump the v* prefix to force-invalidate.
          path: real-code/ios
          key: ios-build-v2-${{ inputs.environment }}-${{ hashFiles('real-code/app.config.js', 'real-code/app.json', 'real-code/plugins/**', 'real-code/yarn.lock', 'real-code/assets/logo-app/**', 'real-code/assets/braze/**', 'real-code/assets/checkout/**', 'real-code/assets/launchscreen-ios/**', 'real-code/firebase/**') }}
          restore-keys: ios-build-v2-${{ inputs.environment }}-

      - name: Create CI keychain
        run: |
          # Ephemeral password: generated per-run, lives only inside this job.
          # `::add-mask::` redacts it from any future log output even though we
          # never echo it directly.
          KEYCHAIN_PWD="$(openssl rand -hex 24)"
          echo "::add-mask::$KEYCHAIN_PWD"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          # Prepend our keychain to the search list so match-installed certs are
          # visible to xcodebuild without disturbing the default. The command
          # substitution is intentionally unquoted: each existing keychain path
          # must be passed as a separate argument.
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          # Fastfile reads both of these.
          echo "KEYCHAIN_NAME=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PWD=$KEYCHAIN_PWD" >> "$GITHUB_ENV"

      - name: Build iOS via fastlane
        working-directory: real-code
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/real-code/fastlane/Gemfile
          DIAWI_API_TOKEN: ${{ secrets.DIAWI_API_TOKEN }}
          DRIVER_KEY_JSON: ${{ secrets.DRIVER_KEY_JSON }}
          GG_DRIVE_FOLDER_ID: ${{ vars.GG_DRIVE_FOLDER_ID }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          FASTLANE_DISABLE_UPDATE_CHECK: "true"
          TEAM_ID: ${{ secrets.TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          PREBUILD_CACHE_HIT: ${{ steps.cache-ios.outputs.cache-hit }}
        run: bundle exec fastlane setup platform:ios env:"$BUILD_ENV" kind:"$BUILD_KIND"

      - name: Upload IPA artifact (backup)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ipa-${{ inputs.environment }}-${{ inputs.kind }}-${{ github.run_id }}
          path: real-code/ios/build/*.ipa
          retention-days: 7
          if-no-files-found: warn

      - name: Notify failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          message: "iOS ${{ inputs.kind }} build failed (run #${{ github.run_number }})"
          webhook-url: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
          project-name: ${{ vars.PROJECT_NAME }}
