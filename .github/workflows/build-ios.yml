name: Mobile Build Internal Testing (iOS)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from Gitea"
        required: true
        default: "migrate"
      environment:
        description: "Environment (staging or live)"
        required: true
        type: choice
        default: "staging"
        options:
          - staging
          - live
      kind:
        description: "Build kind"
        required: true
        type: choice
        default: "adhoc"
        options:
          - adhoc
          - testflight

permissions:
  contents: read

concurrency:
  group: ios-${{ github.event.inputs.environment }}-${{ github.event.inputs.kind }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: iOS ${{ github.event.inputs.kind }} Build (${{ github.event.inputs.environment }})
    runs-on: macos-latest
    environment: ${{ github.event.inputs.environment }}
    timeout-minutes: 120

    env:
      BUILD_BRANCH: ${{ github.event.inputs.branch }}
      BUILD_ENV: ${{ github.event.inputs.environment }}
      BUILD_KIND: ${{ github.event.inputs.kind }}
      PRIVATE_HOST: ${{ secrets.PRIVATE_HOST }}
      PRIVATE_REPO_PATH: ${{ secrets.PRIVATE_REPO_PATH }}

    steps:
      - name: Validate ASC API key for testflight builds
        if: github.event.inputs.kind == 'testflight'
        env:
          ASC_KEY: ${{ secrets.ASC_API_KEY_JSON }}
        run: |
          if [ -z "$ASC_KEY" ]; then
            echo "::error::ASC_API_KEY_JSON secret is required when kind=testflight. Generate one at https://appstoreconnect.apple.com/access/integrations/api (role: App Manager)."
            exit 1
          fi

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup SSH for private Gitea + Match
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 2222 "$PRIVATE_HOST" >> ~/.ssh/known_hosts

          # Trust match repo host (skip if it's the same Gitea instance)
          MATCH_HOST=$(printf '%s' "$MATCH_GIT_URL" | sed -E 's#^(ssh://)?git@([^:/]+).*#\2#')
          MATCH_PORT=$(printf '%s' "$MATCH_GIT_URL" | grep -oE ':[0-9]+' | head -1 | tr -d ':' || true)
          if [ "$MATCH_HOST" != "$PRIVATE_HOST" ]; then
            ssh-keyscan -p "${MATCH_PORT:-22}" "$MATCH_HOST" >> ~/.ssh/known_hosts
          fi

          {
            printf 'Host %s\n' "$PRIVATE_HOST"
            printf '  HostName %s\n' "$PRIVATE_HOST"
            printf '  Port 2222\n'
            printf '  IdentityFile ~/.ssh/id_ed25519\n'
            printf '  StrictHostKeyChecking no\n'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Clone source from Gitea
        run: |
          git clone --depth 1 \
            --branch "$BUILD_BRANCH" \
            --single-branch \
            "ssh://git@${PRIVATE_HOST}:2222/${PRIVATE_REPO_PATH}" \
            real-code

      - name: Write env file
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        working-directory: real-code
        run: |
          if [ "$BUILD_ENV" = "staging" ]; then
            printf '%s\n' "$ENV_FILE_CONTENT" > .env.stg
          else
            printf '%s\n' "$ENV_FILE_CONTENT" > .env.live
          fi

      - name: Write Firebase GoogleService-Info.plist
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.FIREBASE_GOOGLE_SERVICES_IOS }}
        working-directory: real-code
        run: |
          if [ "$BUILD_ENV" = "staging" ]; then
            mkdir -p firebase/staging
            printf '%s' "$GOOGLE_SERVICES_B64" | base64 --decode > firebase/staging/GoogleService-Info.plist
          else
            mkdir -p firebase/production
            printf '%s' "$GOOGLE_SERVICES_B64" | base64 --decode > firebase/production/GoogleService-Info.plist
          fi

      - name: Write ASC API key (testflight only)
        if: github.event.inputs.kind == 'testflight'
        env:
          ASC_KEY: ${{ secrets.ASC_API_KEY_JSON }}
        working-directory: real-code
        run: |
          printf '%s' "$ASC_KEY" > fastlane/api_key.json
          chmod 600 fastlane/api_key.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            real-code/node_modules
            ~/.cache/yarn
          key: yarn-${{ hashFiles('real-code/yarn.lock') }}
          restore-keys: yarn-

      - name: Install JS dependencies
        working-directory: real-code
        run: yarn install --immutable

      - name: Setup Ruby & Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.6"

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: real-code/fastlane/vendor/bundle
          key: gem-${{ hashFiles('real-code/fastlane/Gemfile.lock') }}
          restore-keys: gem-

      - name: Install fastlane gems
        working-directory: real-code/fastlane
        run: |
          gem install bundler
          bundle config set path 'vendor/bundle'
          bundle install --jobs 4 --retry 3

      - name: Cache CocoaPods downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CocoaPods
          key: cocoapods-${{ hashFiles('real-code/yarn.lock') }}
          restore-keys: cocoapods-

      - name: Cache iOS native build
        id: cache-ios
        uses: actions/cache@v4
        with:
          path: real-code/ios
          key: ios-build-${{ github.event.inputs.environment }}-${{ hashFiles('real-code/app.config.js', 'real-code/app.json', 'real-code/plugins/**', 'real-code/yarn.lock', 'real-code/assets/logo-app/**', 'real-code/assets/braze/**', 'real-code/assets/checkout/**', 'real-code/assets/launchscreen-ios/**') }}
          restore-keys: ios-build-${{ github.event.inputs.environment }}-

      - name: Create CI keychain
        run: |
          # Ephemeral password: generated per-run, lives only inside this job.
          # `::add-mask::` tells the runner to redact it from any future log
          # output, even though we never echo it directly.
          KEYCHAIN_PWD="$(openssl rand -hex 24)"
          echo "::add-mask::$KEYCHAIN_PWD"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          # Prepend our keychain to the search list so match-installed certs
          # are visible to xcodebuild without disturbing the default.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          # Export to subsequent steps via $GITHUB_ENV. Fastfile reads both.
          echo "KEYCHAIN_NAME=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PWD=$KEYCHAIN_PWD" >> "$GITHUB_ENV"

      - name: Build iOS via fastlane
        working-directory: real-code
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/real-code/fastlane/Gemfile
          DIAWI_API_TOKEN: ${{ secrets.DIAWI_API_TOKEN }}
          DRIVER_KEY_JSON: ${{ secrets.DRIVER_KEY_JSON }}
          GG_DRIVE_FOLDER_ID: ${{ vars.GG_DRIVE_FOLDER_ID }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          FASTLANE_DISABLE_UPDATE_CHECK: "true"
          TEAM_ID: ${{ secrets.TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          PREBUILD_CACHE_HIT: ${{ steps.cache-ios.outputs.cache-hit }}
        run: bundle exec fastlane setup platform:ios env:"$BUILD_ENV" kind:"$BUILD_KIND"

      - name: Notify failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
        run: |
          ERROR_MSG="iOS ${BUILD_KIND} build failed in job ${GITHUB_JOB} (run #${GITHUB_RUN_NUMBER})"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -X POST \
            -H 'Content-Type: application/json' \
            -d "{\"project\":\"${PROJECT_NAME}\",\"message\":\"${ERROR_MSG}\",\"status\":1,\"link\":\"${RUN_URL}\"}" \
            "$WEBHOOK_URL"
