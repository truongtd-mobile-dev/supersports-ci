name: Mobile Build Internal Testing (Android)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from Gitea"
        required: true
        default: "migrate"
      environment:
        description: "Environment (staging or live)"
        required: true
        type: choice
        default: "staging"
        options:
          - staging
          - live
      kinds:
        description: "Output kinds (comma-separated: apk, aab)"
        required: true
        default: "apk,aab"

permissions:
  contents: read

# Serialize Android runs on the same env+kinds combo so two concurrent
# triggers don't race the cache writeback or burn double minutes. We queue
# rather than cancel because mid-build cancellation leaves Gradle daemons
# and caches in inconsistent states.
concurrency:
  group: android-${{ github.event.inputs.environment }}-${{ github.event.inputs.kinds }}
  cancel-in-progress: false

jobs:
  build-apk:
    name: Android APK Build
    if: contains(github.event.inputs.kinds, 'apk')
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    timeout-minutes: 90

    env:
      BUILD_BRANCH: ${{ github.event.inputs.branch }}
      BUILD_ENV: ${{ github.event.inputs.environment }}
      PRIVATE_HOST: ${{ secrets.PRIVATE_HOST }}
      PRIVATE_REPO_PATH: ${{ secrets.PRIVATE_REPO_PATH }}

    steps:
      - name: Setup SSH for private Gitea repo
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 2222 "$PRIVATE_HOST" >> ~/.ssh/known_hosts
          {
            printf 'Host %s\n' "$PRIVATE_HOST"
            printf '  HostName %s\n' "$PRIVATE_HOST"
            printf '  Port 2222\n'
            printf '  IdentityFile ~/.ssh/id_ed25519\n'
            printf '  StrictHostKeyChecking no\n'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Clone source from Gitea
        run: |
          git clone --depth 1 \
            --branch "$BUILD_BRANCH" \
            --single-branch \
            "ssh://git@${PRIVATE_HOST}:2222/${PRIVATE_REPO_PATH}" \
            real-code

      - name: Write env file
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        working-directory: real-code
        run: |
          if [ "$BUILD_ENV" = "staging" ]; then
            printf '%s\n' "$ENV_FILE_CONTENT" > .env.stg
          else
            printf '%s\n' "$ENV_FILE_CONTENT" > .env.live
          fi

      - name: Write Firebase google-services.json
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.FIREBASE_GOOGLE_SERVICES_ANDROID }}
        working-directory: real-code
        run: |
          if [ "$BUILD_ENV" = "staging" ]; then
            mkdir -p firebase/staging
            printf '%s' "$GOOGLE_SERVICES_B64" | base64 --decode > firebase/staging/google-services.json
          else
            mkdir -p firebase/production
            printf '%s' "$GOOGLE_SERVICES_B64" | base64 --decode > firebase/production/google-services.json
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          # Cache only node_modules (~400MB) — yarn install --immutable verifies
          # integrity against yarn.lock and no-ops on hit. Dropping ~/.cache/yarn
          # frees ~1GB of cache budget for Gradle build cache below; cold-miss
          # path falls back to network fetch (~30-60s extra), which is rare.
          path: real-code/node_modules
          # OS + Node major scoped so Linux runners (Android) and macOS runners
          # (iOS) don't cross-restore each other's prebuilt native modules.
          # Bump the v* prefix to force-invalidate when those change.
          key: yarn-v1-${{ runner.os }}-node24-${{ hashFiles('real-code/yarn.lock') }}
          restore-keys: yarn-v1-${{ runner.os }}-node24-

      - name: Install JS dependencies
        working-directory: real-code
        run: yarn install --immutable

      - name: Setup Ruby & Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.6"

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: real-code/fastlane/vendor/bundle
          key: gem-v1-${{ runner.os }}-${{ hashFiles('real-code/fastlane/Gemfile.lock') }}
          restore-keys: gem-v1-${{ runner.os }}-

      - name: Install fastlane gems
        working-directory: real-code/fastlane
        run: |
          gem install bundler
          bundle config set path 'vendor/bundle'
          bundle install --jobs 4 --retry 3

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle (deps + build cache)
        uses: actions/cache@v4
        with:
          # Includes the actual build-output cache (build-cache-*) — paired
          # with `org.gradle.caching=true` injected by withAndroidGradleBuildCache.
          # The project-local .gradle dir keeps the task graph / up-to-date
          # state between runs, which is what makes warm Gradle truly warm.
          # Gradle manages its own input-hash-based invalidation inside the
          # cache, so the coarse outer key (yarn.lock) is fine — stale entries
          # are simply ignored, never reused incorrectly.
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-*
            ~/.gradle/caches/transforms-*
            ~/.gradle/caches/build-cache-*
            ~/.gradle/wrapper
            real-code/android/.gradle
          key: gradle-v1-${{ runner.os }}-${{ hashFiles('real-code/yarn.lock') }}
          restore-keys: gradle-v1-${{ runner.os }}-

      - name: Cache Android native build
        id: cache-android
        uses: actions/cache@v4
        with:
          # iOS-only assets (launchscreen-ios) dropped from the hash so an
          # iOS-side asset change does not invalidate Android prebuild output.
          path: real-code/android
          key: android-build-v1-${{ github.event.inputs.environment }}-${{ hashFiles('real-code/app.config.js', 'real-code/app.json', 'real-code/plugins/**', 'real-code/yarn.lock', 'real-code/assets/logo-app/**', 'real-code/assets/braze/**', 'real-code/assets/checkout/**') }}
          restore-keys: android-build-v1-${{ github.event.inputs.environment }}-

      - name: Write Android keystore (LIVE only)
        if: github.event.inputs.environment == 'live'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: real-code
        run: |
          mkdir -p credentials
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > credentials/thelook.jks
          {
            printf 'storeFile=credentials/thelook.jks\n'
            printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
          } > keystore.properties

      - name: Build APK via fastlane
        working-directory: real-code
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/real-code/fastlane/Gemfile
          DIAWI_API_TOKEN: ${{ secrets.DIAWI_API_TOKEN }}
          DRIVER_KEY_JSON: ${{ secrets.DRIVER_KEY_JSON }}
          GG_DRIVE_FOLDER_ID: ${{ vars.GG_DRIVE_FOLDER_ID }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          FASTLANE_DISABLE_UPDATE_CHECK: "true"
          PREBUILD_CACHE_HIT: ${{ steps.cache-android.outputs.cache-hit }}
        run: bundle exec fastlane setup platform:android env:"$BUILD_ENV" kind:apk

      - name: Notify failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
        run: |
          ERROR_MSG="APK build failed in job ${GITHUB_JOB} (run #${GITHUB_RUN_NUMBER})"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -X POST \
            -H 'Content-Type: application/json' \
            -d "{\"project\":\"${PROJECT_NAME}\",\"message\":\"${ERROR_MSG}\",\"status\":1,\"link\":\"${RUN_URL}\"}" \
            "$WEBHOOK_URL"

  build-aab:
    name: Android AAB Build
    if: contains(github.event.inputs.kinds, 'aab')
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    timeout-minutes: 90

    env:
      BUILD_BRANCH: ${{ github.event.inputs.branch }}
      BUILD_ENV: ${{ github.event.inputs.environment }}
      PRIVATE_HOST: ${{ secrets.PRIVATE_HOST }}
      PRIVATE_REPO_PATH: ${{ secrets.PRIVATE_REPO_PATH }}

    steps:
      - name: Setup SSH for private Gitea repo
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 2222 "$PRIVATE_HOST" >> ~/.ssh/known_hosts
          {
            printf 'Host %s\n' "$PRIVATE_HOST"
            printf '  HostName %s\n' "$PRIVATE_HOST"
            printf '  Port 2222\n'
            printf '  IdentityFile ~/.ssh/id_ed25519\n'
            printf '  StrictHostKeyChecking no\n'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Clone source from Gitea
        run: |
          git clone --depth 1 \
            --branch "$BUILD_BRANCH" \
