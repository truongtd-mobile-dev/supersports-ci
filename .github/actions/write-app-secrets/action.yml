name: Write app secrets
description: >-
  Materialize the per-environment .env file and the Firebase config
  (GoogleService-Info.plist for iOS, google-services.json for Android) into the
  cloned source at real-code/.

inputs:
  environment:
    description: staging or live.
    required: true
  env-file:
    description: Contents of the .env file for the chosen environment.
    required: true
  firebase-config:
    description: >-
      Base64-encoded Firebase config — GoogleService-Info.plist for iOS,
      google-services.json for Android.
    required: true
  platform:
    description: ios or android — selects the Firebase filename.
    required: true

runs:
  using: composite
  steps:
    - name: Write env file
      shell: bash
      working-directory: real-code
      env:
        BUILD_ENV: ${{ inputs.environment }}
        ENV_FILE_CONTENT: ${{ inputs.env-file }}
      run: |
        if [ "$BUILD_ENV" = "staging" ]; then
          printf '%s\n' "$ENV_FILE_CONTENT" > .env.stg
        else
          printf '%s\n' "$ENV_FILE_CONTENT" > .env.live
        fi

    - name: Write Firebase config
      shell: bash
      working-directory: real-code
      env:
        BUILD_ENV: ${{ inputs.environment }}
        PLATFORM: ${{ inputs.platform }}
        FIREBASE_CONFIG_B64: ${{ inputs.firebase-config }}
      run: |
        if [ "$PLATFORM" = "ios" ]; then
          filename="GoogleService-Info.plist"
        else
          filename="google-services.json"
        fi
        if [ "$BUILD_ENV" = "staging" ]; then
          dir="firebase/staging"
        else
          dir="firebase/production"
        fi
        mkdir -p "$dir"
        printf '%s' "$FIREBASE_CONFIG_B64" | base64 --decode > "$dir/$filename"
