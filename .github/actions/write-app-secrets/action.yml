name: Write app secrets
description: >-
  Materialize the per-environment .env file into the cloned source at
  real-code/. Firebase config (GoogleService-Info.plist / google-services.json)
  is committed in the app repo and arrives with the checkout — no longer
  written here.

inputs:
  environment:
    description: staging or live.
    required: true
  env-file:
    description: Contents of the .env file for the chosen environment.
    required: true

runs:
  using: composite
  steps:
    - name: Write env file
      shell: bash
      working-directory: real-code
      env:
        BUILD_ENV: ${{ inputs.environment }}
        ENV_FILE_CONTENT: ${{ inputs.env-file }}
      run: |
        if [ "$BUILD_ENV" = "staging" ]; then
          printf '%s\n' "$ENV_FILE_CONTENT" > .env.stg
        else
          printf '%s\n' "$ENV_FILE_CONTENT" > .env.live
        fi
